replicas:
  min: 1
  max: 1
kafkaPool: nav-dev
azure:
  enabled: true
  tenant: trygdeetaten.no

accessPolicy:
  outbound:
    - application: spiskammerset
  external:
    - oppgave.intern.dev.nav.no

env:
  - name: KAFKA_MAX_RECORDS
    value: "50"
  - name: KAFKA_MAX_POLL_INTERVAL_MS
    value: "500000"
  - name: GOSYS_BASE_URL
    value: https://oppgave.intern.dev.nav.no
  - name: GOSYS_SCOPE
    value: api://dev-fss.oppgavehandtering.oppgave/.default
  - name: SPISKAMMERSET_BASE_URL
    value: http://spiskammerset
  - name: SPISKAMMERSET_SCOPE
    value: api://dev-gcp.tbd.spiskammerset/.default
  - name: KAFKA_RESET_POLICY
    value: LATEST
